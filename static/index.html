<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مشاوره حقوقی سربازی</title>
<style>
    :root {
        --primary: #0d6efd;
        --bg: #f6f9fc;
        --card: #ffffff;
        --border: #e4edf5;
        --text: #1f2a37;
        --muted: #6b7a8c;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        font-family: "Vazirmatn", Tahoma, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        justify-content: center;
        min-height: 100vh;
        padding: 24px 12px;
    }

    .chat-container {
        width: 100%;
        max-width: 720px;
        display: flex;
        flex-direction: column;
        height: calc(100vh - 48px);
        background: var(--card);
        border-radius: 16px;
        border: 1px solid var(--border);
        box-shadow: 0 4px 16px rgba(0,0,0,0.05);
        overflow: hidden;
    }

    header {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    header h1 {
        font-size: 1.1rem;
        margin: 0;
    }

    header button {
        border: none;
        background: transparent;
        color: var(--muted);
        font-size: 0.85rem;
        cursor: pointer;
    }

    #messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 14px;
    }

    .msg {
        max-width: 85%;
        padding: 12px 16px;
        border-radius: 14px;
        line-height: 1.8;
        white-space: pre-wrap;
        font-size: 0.95rem;
    }

    .msg.user {
        align-self: flex-start;
        background: var(--primary);
        color: white;
        border-bottom-left-radius: 4px;
    }

    .msg.assistant {
        align-self: flex-end;
        background: var(--bg);
        border: 1px solid var(--border);
        border-bottom-right-radius: 4px;
    }

    .sources {
        margin-top: 8px;
        font-size: 0.78rem;
        color: var(--muted);
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .sources a {
        color: var(--primary);
        text-decoration: none;
    }

    .typing {
        align-self: flex-end;
        color: var(--muted);
        font-size: 0.85rem;
    }

    form {
        display: flex;
        gap: 8px;
        padding: 16px;
        border-top: 1px solid var(--border);
    }

    textarea {
        flex: 1;
        resize: none;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 14px;
        font-family: inherit;
        font-size: 0.95rem;
        min-height: 44px;
        max-height: 120px;
    }

    button.send {
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 10px;
        padding: 0 20px;
        font-size: 0.9rem;
        cursor: pointer;
    }

    button.send:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }
</style>
</head>
<body>

<div class="chat-container">
    <header>
        <h1>مشاوره حقوقی سربازی</h1>
        <button id="reset-btn">شروع مکالمه جدید</button>
    </header>

    <div id="messages"></div>

    <form id="chat-form">
        <textarea id="query-input" placeholder="سوال حقوقی خود را درباره سربازی بنویسید..." rows="1"></textarea>
        <button type="submit" class="send" id="send-btn">ارسال</button>
    </form>
</div>

<script>
const API_BASE = "";
let sessionId = localStorage.getItem("dadrah_session_id") || null;

const messagesEl = document.getElementById("messages");
const formEl = document.getElementById("chat-form");
const inputEl = document.getElementById("query-input");
const sendBtn = document.getElementById("send-btn");
const resetBtn = document.getElementById("reset-btn");

function addMessage(role, text, sources) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.textContent = text;

    if (sources && sources.length > 0) {
        const sourcesDiv = document.createElement("div");
        sourcesDiv.className = "sources";
        sources.forEach(url => {
            const a = document.createElement("a");
            a.href = url;
            a.target = "_blank";
            a.textContent = url;
            sourcesDiv.appendChild(a);
        });
        div.appendChild(sourcesDiv);
    }

    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addTyping() {
    const div = document.createElement("div");
    div.className = "typing";
    div.id = "typing-indicator";
    div.textContent = "در حال بررسی منابع و نوشتن پاسخ...";
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
}

async function sendQuery(query) {
    addMessage("user", query);
    addTyping();
    sendBtn.disabled = true;

    try {
        const res = await fetch(API_BASE + "/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query, session_id: sessionId }),
        });

        if (!res.ok) throw new Error("خطا در ارتباط با سرور");

        const data = await res.json();
        sessionId = data.session_id;
        localStorage.setItem("dadrah_session_id", sessionId);

        removeTyping();
        addMessage("assistant", data.answer, data.sources);
    } catch (err) {
        removeTyping();
        addMessage("assistant", "خطایی رخ داد: " + err.message);
    } finally {
        sendBtn.disabled = false;
    }
}

formEl.addEventListener("submit", (e) => {
    e.preventDefault();
    const query = inputEl.value.trim();
    if (!query) return;
    inputEl.value = "";
    sendQuery(query);
});

inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        formEl.requestSubmit();
    }
});

resetBtn.addEventListener("click", async () => {
    if (sessionId) {
        await fetch(API_BASE + "/session/" + sessionId, { method: "DELETE" });
    }
    sessionId = null;
    localStorage.removeItem("dadrah_session_id");
    messagesEl.innerHTML = "";
});
</script>

</body>
</html>
